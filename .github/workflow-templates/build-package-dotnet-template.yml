# ============================================================================
# Build .NET Package - Workflow Template
# Builds a .NET package with versioning and artifact management.
# ----------------------------------------------------------------------------
# Inputs:
#   release_version (string, required): Version number (e.g., 1.2.3)
#   dotnet_version (string, optional): .NET SDK version (default: 8.0.x)
#   project_path (string, optional): Path to solution/project (default: auto-discover)
#   artifact_name (string, optional): Name for package artifacts (default: nuget-packages)
#   artifact_paths (string, optional): Paths to package outputs (default: **/bin/Release/*.nupkg)
#   artifact_retention_days (number, optional): Days to retain artifacts (default: 7)
# Outputs:
#   package_version: The version of the built package
#   artifact_url: URL to download the package artifacts
# Documentation: See docs/build-package-dotnet.md for more details.
# ============================================================================
name: Build .NET Package (Template)

on:
  workflow_call:
    inputs:
      # Required inputs first
      release_version:
        description: 'Version number for the package (e.g., 1.2.3)'
        required: true
        type: string
      # Optional inputs with defaults
      dotnet_version:
        description: '.NET SDK version to use'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank for auto-discovery)'
        required: false
        default: '.'
        type: string
      artifact_name:
        description: 'Name for the package artifacts'
        required: false
        default: 'nuget-packages'
        type: string
      artifact_paths:
        description: 'Paths to include in artifacts'
        required: false
        default: './artifacts/*.nupkg'
        type: string
      artifact_retention_days:
        description: 'Days to keep artifact'
        required: false
        default: 7
        type: number
      upload_artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: true
        type: boolean
jobs:
  build-package:
    uses: ./.github/workflows/build-package-dotnet-ci.yml
    with:
      release_version: ${{ inputs.release_version }}
      dotnet_version: ${{ inputs.dotnet_version }}
      project_path: ${{ inputs.project_path }}
      artifact_name: ${{ inputs.artifact_name }}
      artifact_paths: ${{ inputs.artifact_paths }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      upload_artifacts: ${{ inputs.upload_artifacts }}
