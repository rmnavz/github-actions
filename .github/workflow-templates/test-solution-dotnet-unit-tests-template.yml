# ============================================================================
# Run .NET Tests - Workflow Template
# Runs unit tests for a .NET solution with configurable test reporting.
# ----------------------------------------------------------------------------
# Inputs:
#   dotnet_version (string, optional): .NET SDK version (default: 8.0.x)
#   project_path (string, optional): Path to solution/project (default: auto-discover)
#   use_build_artifact (boolean, optional): Use build artifact from previous job (default: false)
#   build_artifact_name (string, optional): Name of build artifact to use (default: build-artifacts)
#   test_filter (string, optional): Test filter criteria (default: Category!=Integration)
#   collect_coverage (boolean, optional): Collect code coverage (default: true)
# Outputs:
#   test_results: Summary of test execution results
#   coverage_report: Code coverage analysis report
# Documentation: See docs/test-solution-dotnet-unit-tests.md for more details.
# ============================================================================
name: Run .NET Tests (Template)

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: '.NET SDK version to use'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank for auto-discovery)'
        required: false
        default: ''
        type: string
      use_build_artifact:
        description: 'Use build artifact from previous job'
        required: false
        default: false
        type: boolean
      build_artifact_name:
        description: 'Name of build artifact to use'
        required: false
        default: 'build-artifacts'
        type: string
      test_results_artifact_name:
        description: 'Name for uploaded test results artifact'
        required: false
        default: 'test-results'
        type: string
      test_results_paths:
        description: 'Paths to test result files to upload'
        required: false
        default: 'TestResults/**/*.trx\nTestResults/**/*.xml'
        type: string
      test_results_retention_days:
        description: 'Days to keep test results artifact'
        required: false
        default: 30
        type: number
jobs:
  test:
    uses: ./.github/workflows/test-solution-dotnet-unit-tests.yml
    with:
      dotnet_version: ${{ inputs.dotnet_version }}
      project_path: ${{ inputs.project_path }}
      use_build_artifact: ${{ inputs.use_build_artifact }}
      build_artifact_name: ${{ inputs.build_artifact_name }}
      test_results_artifact_name: ${{ inputs.test_results_artifact_name }}
      test_results_paths: ${{ inputs.test_results_paths }}
      test_results_retention_days: ${{ inputs.test_results_retention_days }}
