# ============================================================================
# Publish Package (.NET Release) - Workflow Template
# This template sets up a reusable .NET package publish workflow.
# ============================================================================
name: Publish Package (.NET Release) (Template)

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: false
        type: boolean
      include_test_results:
        description: 'Include test results in release notes'
        required: false
        default: true
        type: boolean
      artifact_name:
        description: 'Name of the NuGet artifact to download'
        required: false
        default: 'nuget-packages'
        type: string
jobs:
  publish-release:
    uses: ./.github/workflows/publish-package-dotnet-release.yml
    with:
      release_version: ${{ inputs.release_version }}
      prerelease: ${{ inputs.prerelease }}
      include_test_results: ${{ inputs.include_test_results }}
      artifact_name: ${{ inputs.artifact_name }}
