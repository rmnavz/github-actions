# ============================================================================
# Tag Git (Generic Release) - Workflow Template
# Creates and pushes git tags using any provided string, supports annotated tags
# and multi-branch tagging.
# ----------------------------------------------------------------------------
# Inputs:
#   version (string, required): The string to use for the tag (e.g. 1.2.3)
#   tag_prefix (string, optional): Prefix for the tag name (default: v)
#   tag_annotation (string, optional): Annotated tag message
#   tag_branches (string, optional): Comma-separated list of branches/tags to tag on
#                                   (default: main,develop,release/)
# Outputs:
#   None
# Documentation: See docs/tag-git-generic-release.md for more details.
# ============================================================================
name: Tag Git (Generic Release) (Template)

on:
  workflow_call:
    inputs:
      version:
        description: 'The string to use for the tag (e.g. 1.2.3, release-2025-08-08, etc.)'
        required: true
        type: string
      tag_prefix:
        description: 'Prefix for the tag name (e.g. v, release-)'
        required: false
        default: 'v'
        type: string
      tag_annotation:
        description: 'Annotated tag message (optional)'
        required: false
        default: ''
        type: string
      tag_branches:
        description: 'Comma-separated list of branches/tags to create tags on'
        required: false
        default: 'main,develop,release/'
        type: string
jobs:
  tag-release:
    uses: ./.github/workflows/tag-git-generic-release.yml
    with:
      version: ${{ inputs.version }}
      tag_prefix: ${{ inputs.tag_prefix }}
      tag_annotation: ${{ inputs.tag_annotation }}
      tag_branches: ${{ inputs.tag_branches }}
