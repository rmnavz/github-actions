# ============================================================================
# Publish Package (NuGet Release) - Template
# Thin wrapper for the implementation workflow, for discoverability and reuse.
# ============================================================================

name: Publish Package (NuGet Release) (Template)

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0, 2025.08.10, release-42)'
        required: true
        type: string
      artifact_name:
        description: 'Name of the NuGet artifact to download (e.g., nuget-packages)'
        required: true
        type: string
      changelog_path:
        description: 'Path to changelog file'
        required: false
        default: 'CHANGELOG.md'
        type: string
      commit_count:
        description: 'Number of recent commits to include'
        required: false
        default: 10
        type: number
      create_github_release:
        description: 'Whether to create a GitHub release'
        required: false
        default: true
        type: boolean
    secrets:
      NUGET_API_KEY:
        description: 'API key for publishing to NuGet.org'
        required: true
      GITHUB_TOKEN:
        description: 'GitHub token for creating releases (if enabled)'
        required: false

jobs:
  main:
    uses: ./.github/workflows/publish-package-nuget-release.yml
    with:
      release_version: ${{ inputs.release_version }}
      artifact_name: ${{ inputs.artifact_name }}
      changelog_path: ${{ inputs.changelog_path }}
      commit_count: ${{ inputs.commit_count }}
      create_github_release: ${{ inputs.create_github_release }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
