# ============================================================================
# .NET Security Check - Workflow Template
# Performs security checks for .NET projects including package vulnerabilities
# and optional CodeQL analysis.
# ----------------------------------------------------------------------------
# Inputs:
#   dotnet_version (string, optional): .NET SDK version (default: 8.0.x)
#   run_vulnerability_check (boolean, optional): Run package vulnerability check (default: true)
#   run_codeql (boolean, optional): Run CodeQL analysis (default: false)
# Outputs:
#   vulnerability_status: Status of vulnerability check (found/none)
# Documentation: See docs/dotnet-security-check.md for more details.
# ============================================================================
name: .NET Security Check (Template)

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: '.NET SDK version (e.g., 8.0.x)'
        required: false
        default: '8.0.x'
        type: string
      run_vulnerability_check:
        description: 'Run dotnet package vulnerability check'
        required: false
        default: true
        type: boolean
      run_codeql:
        description: 'Run CodeQL analysis'
        required: false
        default: false
        type: boolean
jobs:
  security-check:
    uses: ./.github/workflows/dotnet-security-check.yml
    with:
      dotnet_version: ${{ inputs.dotnet_version }}
      run_vulnerability_check: ${{ inputs.run_vulnerability_check }}
      run_codeql: ${{ inputs.run_codeql }}
