# ============================================================================
# Build .NET Solution - Workflow Template
# Builds a .NET solution with dependency caching and artifact management.
# ----------------------------------------------------------------------------
# Inputs:
#   dotnet_version (string, optional): .NET SDK version (default: 8.0.x)
#   project_path (string, optional): Path to solution/project (default: auto-discover)
#   artifact_name (string, optional): Name for build artifacts (default: build-artifacts)
#   artifact_paths (string, optional): Paths to include in artifacts (default: **/bin/Release/)
#   artifact_retention_days (number, optional): Days to retain artifacts (default: 7)
#   upload_artifacts (boolean, optional): Whether to upload artifacts (default: true)
# Outputs:
#   build_status: Success/failure status of the build
#   artifact_url: URL to download the build artifacts
# Documentation: See docs/build-solution-dotnet.md for more details.
# ============================================================================
name: Build .NET Solution (Template)

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: '.NET SDK version to use'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank for auto-discovery)'
        required: false
        default: ''
        type: string
      artifact_name:
        description: 'Name for the build artifacts'
        required: false
        default: 'build-artifacts'
        type: string
      artifact_paths:
        description: 'Paths to include in artifacts'
        required: false
        default: '**/bin/Release/'
        type: string
      artifact_retention_days:
        description: 'Days to keep artifact'
        required: false
        default: 7
        type: number
      upload_artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: true
        type: boolean
jobs:
  build:
    uses: ./.github/workflows/build-solution-dotnet-ci.yml
    with:
      dotnet_version: ${{ inputs.dotnet_version }}
      project_path: ${{ inputs.project_path }}
      artifact_name: ${{ inputs.artifact_name }}
      artifact_paths: ${{ inputs.artifact_paths }}
      artifact_retention_days: ${{ inputs.artifact_retention_days }}
      upload_artifacts: ${{ inputs.upload_artifacts }}
