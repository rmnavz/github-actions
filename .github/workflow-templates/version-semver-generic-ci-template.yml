# ============================================================================
# Version (Semantic, Generic CI) - Workflow Template
# Calculates semantic version using GitVersion for CI pipelines without creating
# or pushing tags.
# ----------------------------------------------------------------------------
# Inputs:
#   gitversion_version (string, optional): GitVersion version to use (default: 5.x)
#   gitversion_config (string, optional): Path to gitversion.yml config file
# Outputs:
#   semver: The calculated semver
#   major: Major version number
#   minor: Minor version number
#   patch: Patch version number
#   fullSemVer: Full semantic version
# Documentation: See docs/version-semver-generic-ci.md for more details.
# ============================================================================
name: Version (Semantic, Generic CI) (Template)

on:
  workflow_call:
    inputs:
      gitversion_version:
        description: 'GitVersion version to use'
        required: false
        default: '5.x'
        type: string
      gitversion_config:
        description: 'Path to gitversion.yml config file (optional)'
        required: false
        default: ''
        type: string
jobs:
  get-version:
    uses: ./.github/workflows/version-semver-generic-ci.yml
    with:
      gitversion_version: ${{ inputs.gitversion_version }}
      gitversion_config: ${{ inputs.gitversion_config }}
