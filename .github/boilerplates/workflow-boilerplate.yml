# ============================================================================
# WORKFLOW_NAME
# One-line description of what this workflow does
# Designed for universal use and workflow reusability.
# ----------------------------------------------------------------------------
# Inputs:
#   required_input (string, required): Description of required input
#   optional_input (string, optional): Description of optional input (default: default-value)
#   enable_feature (boolean, optional): Enable optional feature (default: false)
#   retention_days (number, optional): Days to retain artifacts (default: 7)
# Outputs:
#   job_output: Output from the main job
# Usage Example:
#   jobs:
#     workflow_job:
#       uses: your-org/github-actions/.github/workflows/workflow-name.yml@v1.0.0
#       with:
#         required_input: 'value'
#         optional_input: 'custom-value'
# Documentation: See docs/workflow-name.md for more details.
# ============================================================================
name: WORKFLOW_NAME

on:
  workflow_call:
    inputs:
      required_input:
        description: 'Clear description of what this input does and how it affects the workflow'
        required: true
        type: string
      optional_input:
        description: 'Description of optional input with its default behavior'
        required: false
        default: 'default-value'
        type: string
      enable_feature:
        description: 'Enable optional feature'
        required: false
        default: false
        type: boolean
      retention_days:
        description: 'Days to retain artifacts'
        required: false
        default: 7
        type: number

    secrets:
      WORKFLOW_SECRET:
        description: 'Description of what this secret is used for'
        required: false

    outputs:
      job_output:
        description: 'Output from the main job'
        value: ${{ jobs.main.outputs.job_output }}

env:
  EXAMPLE_VAR: 'value'

jobs:
  main:
    name: Main Job
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        os: [ubuntu-latest, windows-latest]
    outputs:
      job_output: ${{ steps.example_step.outputs.job_output }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Example step
        id: example_step
        run: |
          echo "job_output=42" >> "$GITHUB_OUTPUT"

      - name: Conditional step
        if: ${{ inputs.enable_feature }}
        run: echo "Feature enabled!"

      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: example-artifact
          path: ./path/to/artifact
          retention-days: ${{ inputs.retention_days }}

  secondary:
    needs: main
    runs-on: ubuntu-latest
    steps:
      - name: Secondary step
        run: echo "This job runs after main job"

# Notes & Best Practices:
# - Use clear, descriptive names for jobs, steps, and inputs
# - Document all inputs, outputs, secrets, and environment variables at the top
# - Use 'workflow_call' for reusability and composability
# - Use 'if:' conditions for optional/conditional steps
# - Prefer 'always()' for artifact upload to ensure results are saved even on failure
# - Use 'id:' for steps whose outputs are needed later
# - Keep secrets to a minimum and document their use and scope
# - Add caching, matrix, or environment strategies for performance and flexibility
# - Use environment variables for global config, and matrix for multi-version testing
# - Replace Node.js steps with setup-dotnet, setup-python, etc. as needed for your stack
