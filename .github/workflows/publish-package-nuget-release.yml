# ============================================================================
# Publish Package (NuGet Release)
# Publishes NuGet packages to nuget.org and (optionally) creates a GitHub release. Designed for universal use and workflow reusability.
# ----------------------------------------------------------------------------
# Inputs:
#   release_version (string, required): Release version (e.g., v1.0, 2025.08.10, release-42)
#   artifact_name (string, required): Name of the NuGet artifact to download (e.g., nuget-packages)
#   changelog_path (string, optional): Path to changelog file (default: CHANGELOG.md)
#   commit_count (number, optional): Number of recent commits to include (default: 10)
#   create_github_release (boolean, optional): Whether to create a GitHub release (default: true)
# Secrets:
#   NUGET_API_KEY: API key for publishing to NuGet.org
#   GITHUB_TOKEN: GitHub token for creating releases (if enabled)
# Outputs:
#   release_url: URL of the created GitHub release (if created)
# Usage Example:
#   jobs:
#     publish-nuget-release:
#       uses: rmnavz/github-actions/.github/workflows/publish-package-nuget-release.yml@v1.0.0
#       with:
#         release_version: 'v1.0.0'
#         artifact_name: 'nuget-packages'
#         create_github_release: true
# Documentation: See docs/publish-package-nuget-release.md
# ============================================================================

name: Publish Package (NuGet Release)

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0, 2025.08.10, release-42)'
        required: true
        type: string
      artifact_name:
        description: 'Name of the NuGet artifact to download (e.g., nuget-packages)'
        required: true
        type: string
      changelog_path:
        description: 'Path to changelog file'
        required: false
        default: 'CHANGELOG.md'
        type: string
      commit_count:
        description: 'Number of recent commits to include'
        required: false
        default: 10
        type: number
      create_github_release:
        description: 'Whether to create a GitHub release'
        required: false
        default: true
        type: boolean
    secrets:
      NUGET_API_KEY:
        description: 'API key for publishing to NuGet.org'
        required: true
      GITHUB_TOKEN:
        description: 'GitHub token for creating releases (if enabled)'
        required: false
    outputs:
      release_url:
        description: 'URL of the created GitHub release (if created)'
        value: ${{ jobs.publish-nuget-release.outputs.release_url }}
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0, 2025.08.10, release-42)'
        required: true
        type: string
      artifact_name:
        description: 'Name of the NuGet artifact to download (e.g., nuget-packages)'
        required: true
        type: string
      changelog_path:
        description: 'Path to changelog file'
        required: false
        default: 'CHANGELOG.md'
        type: string
      commit_count:
        description: 'Number of recent commits to include'
        required: false
        default: 10
        type: number
      create_github_release:
        description: 'Whether to create a GitHub release'
        required: false
        default: true
        type: boolean

jobs:
  publish-nuget-release:
    name: Publish NuGet Package and (Optionally) Create Release
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download NuGet Packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
      - name: Publish to NuGet
        run: |
          for pkg in ./*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      - name: Generate Release Notes
        id: release_notes
        if: ${{ inputs.create_github_release }}
        run: |
          echo "# Release ${{ inputs.release_version }}" > release_notes.md
          echo "" >> release_notes.md
          echo "## 📦 NuGet Packages" >> release_notes.md
          echo "" >> release_notes.md
          for pkg in *.nupkg; do
            if [ -f "$pkg" ]; then
              echo "- \`$pkg\`" >> release_notes.md
            fi
          done
          echo "" >> release_notes.md
          echo "## 📝 Changelog" >> release_notes.md
          if [ -f "${{ inputs.changelog_path }}" ]; then
            cat "${{ inputs.changelog_path }}" >> release_notes.md
          else
            echo "No changelog available." >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "## 🔄 Recent Commits" >> release_notes.md
          git log --pretty=format:'- %s (%an, %h)' --no-merges -n ${{ inputs.commit_count }} >> release_notes.md
      - name: Create GitHub Release
        id: create_release
        if: ${{ inputs.create_github_release }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.release_version }}
          name: Release ${{ inputs.release_version }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: "*.nupkg"
