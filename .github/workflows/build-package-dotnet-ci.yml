# ============================================================================
# Build .NET Package
# Builds and packages a .NET project with configurable versioning and artifacts.
# Designed for universal use and workflow reusability.
# ----------------------------------------------------------------------------
# Inputs:
#   release_version (string, required): Version number (e.g., 1.2.3)
#   dotnet_version (string, optional): .NET SDK version (default: 8.0.x)
#   project_path (string, optional): Path to solution/project (default: auto-discover)
#   artifact_name (string, optional): Name for package artifacts (default: nuget-packages)
#   artifact_paths (string, optional): Paths to package outputs (default: **/bin/Release/*.nupkg)
#   artifact_retention_days (number, optional): Days to retain artifacts (default: 7)
# Outputs:
#   package_version: The version of the built package
#   artifact_url: URL to download the package artifacts
# Usage Example:
#   jobs:
#     build-package:
#       uses: rmnavz/github-actions/.github/workflows/build-package-dotnet-ci.yml@v1.0.0
#       with:
#         release_version: '1.2.3'
#         project_path: 'src/MyPackage'
# Documentation: See docs/build-package-dotnet-ci.md for more details.
# ============================================================================
name: Build .NET Package

on:
  workflow_call:
    inputs:
      # Required inputs first
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version (e.g., 8.0.x)'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank = auto-discover)'
        required: false
        default: '.'
        type: string
      artifact_name:
        description: 'Name for uploaded artifact'
        required: false
        default: 'nuget-packages'
        type: string
      artifact_paths:
        description: 'Paths to include in artifact'
        required: false
        default: './artifacts/*.nupkg'
        type: string
      artifact_retention_days:
        description: 'Days to keep artifact'
        required: false
        default: 7
        type: number
      upload_artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version (e.g., 8.0.x)'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank = auto-discover)'
        required: false
        default: '.'
        type: string
      artifact_name:
        description: 'Name for uploaded artifact'
        required: false
        default: 'nuget-packages'
        type: string
      artifact_paths:
        description: 'Paths to include in artifact'
        required: false
        default: './artifacts/*.nupkg'
        type: string
      artifact_retention_days:
        description: 'Days to keep artifact'
        required: false
        default: 7
        type: number
      upload_artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: true
        type: boolean

jobs:
  build-package-dotnet:
    name: Build and Package .NET Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
      - name: Restore Dependencies
        run: dotnet restore ${{ inputs.project_path }}
      - name: Build Project
        run: dotnet build ${{ inputs.project_path }} --configuration Release
      - name: Pack NuGet Package
        run: dotnet pack ${{ inputs.project_path }} --configuration Release -p:PackageVersion=${{ inputs.release_version }} --output ./artifacts
      - name: Upload NuGet Packages Artifact
        if: ${{ inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_paths }}
          retention-days: ${{ inputs.artifact_retention_days }}
