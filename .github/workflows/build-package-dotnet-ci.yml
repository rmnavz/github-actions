# ============================================================================
# Documentation: See docs/build-package-dotnet-ci.md
# Build Package (.NET CI)
# Builds and packages a .NET project for any versioning scheme. Uploads NuGet
# packages as artifacts. Designed for universal use and workflow reusability.
# ----------------------------------------------------------------------------
# Inputs:
#   release_version (string, required): Release version (e.g., 1.2.3, 2025.08.08, release-42)
#   dotnet_version  (string, optional): .NET SDK version (default: 8.0.x)
#   project_path    (string, optional): Path to solution/project (default: ".")
#   artifact_name   (string, optional): Name for uploaded artifact (default: nuget-packages)
#   artifact_paths  (string, optional): Paths to include in artifact (default: ./artifacts/*.nupkg)
#   artifact_retention_days (number, optional): Days to keep artifact (default: 7)
#   upload_artifacts (boolean, optional): Whether to upload build artifacts (default: true)
# Outputs:
#   nuget_packages  (artifact): The produced NuGet package files

# Notes & Best Practices:
# - Use clear, descriptive names for jobs, steps, and inputs.
# - Document all inputs, outputs, and secrets at the top.
# - Use 'workflow_call' for reusability and composability.
# - Use 'id:' for steps whose outputs are needed later.
# - Pin action versions for reproducibility.

name: Build Package (.NET CI)

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version (e.g., 8.0.x)'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank = auto-discover)'
        required: false
        default: '.'
        type: string
      artifact_name:
        description: 'Name for uploaded artifact'
        required: false
        default: 'nuget-packages'
        type: string
      artifact_paths:
        description: 'Paths to include in artifact'
        required: false
        default: './artifacts/*.nupkg'
        type: string
      artifact_retention_days:
        description: 'Days to keep artifact'
        required: false
        default: 7
        type: number
      upload_artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version (e.g., 8.0.x)'
        required: false
        default: '8.0.x'
        type: string
      project_path:
        description: 'Path to solution/project (blank = auto-discover)'
        required: false
        default: '.'
        type: string
      artifact_name:
        description: 'Name for uploaded artifact'
        required: false
        default: 'nuget-packages'
        type: string
      artifact_paths:
        description: 'Paths to include in artifact'
        required: false
        default: './artifacts/*.nupkg'
        type: string
      artifact_retention_days:
        description: 'Days to keep artifact'
        required: false
        default: 7
        type: number
      upload_artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        default: true
        type: boolean

jobs:
  build-package-dotnet:
    name: Build and Package .NET Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
      - name: Restore Dependencies
        run: dotnet restore ${{ inputs.project_path }}
      - name: Build Project
        run: dotnet build ${{ inputs.project_path }} --configuration Release
      - name: Pack NuGet Package
        run: dotnet pack ${{ inputs.project_path }} --configuration Release -p:PackageVersion=${{ inputs.release_version }} --output ./artifacts
      - name: Upload NuGet Packages Artifact
        if: ${{ inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_paths }}
          retention-days: ${{ inputs.artifact_retention_days }}
