

# ============================================================================
# Tag Git (Generic Release)
# Creates and pushes a git tag using any provided string (universal, not limited to semantic versioning).
# ----------------------------------------------------------------------------
# Inputs:
#   version (string, required): The string to use for the tag (e.g. 1.2.3, release-2025-08-08, etc.)
#   tag_prefix (string, optional): Prefix for the tag name (default: v)
#   tag_annotation (string, optional): Annotated tag message (optional)
#   tag_branches (string, optional): Comma-separated list of branches/tags to create tags on (default: main,develop,release/)
# Outputs: None
# Usage Example:
#   jobs:
#     tag-release:
#       uses: rmnavz/github-actions/.github/workflows/tag-git-generic-release.yml@v1.0.0
#       with:
#         version: ${{ needs.get-version.outputs.version }}
#         tag_prefix: 'v'
#         tag_annotation: 'Release version'
#         tag_branches: 'main,develop,release/'
# Documentation: No dedicated docs/tag-git-generic-release.md as of 2025-08-08. See workflow header and inline comments for usage details.
# ============================================================================

name: Tag Git (Generic Release)

on:
  workflow_call:
    inputs:
      version:
        description: 'The string to use for the tag (e.g. 1.2.3, release-2025-08-08, etc.)'
        required: true
        type: string
      tag_prefix:
        description: 'Prefix for the tag name (e.g. v, release-)'
        required: false
        default: 'v'
        type: string
      tag_annotation:
        description: 'Annotated tag message (optional)'
        required: false
        default: ''
        type: string
      tag_branches:
        description: 'Comma-separated list of branches/tags to create tags on (e.g. main,develop,release/)'
        required: false
        default: 'main,develop,release/'
        type: string

permissions:
  contents: write


jobs:
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Tag Exists
        id: check_tag
        run: |
          if git rev-parse "${{ inputs.tag_prefix }}${{ inputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: ${{ steps.check_tag.outputs.exists == 'false' && (contains(inputs.tag_branches, github.ref_name) || startsWith(github.ref, 'refs/tags/' )) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "${{ inputs.tag_annotation }}" ]; then
            git tag -a "${{ inputs.tag_prefix }}${{ inputs.version }}" -m "${{ inputs.tag_annotation }}"
          else
            git tag "${{ inputs.tag_prefix }}${{ inputs.version }}"
          fi
          git push origin "${{ inputs.tag_prefix }}${{ inputs.version }}"

# Notes & Best Practices:
# - Use clear, descriptive names for jobs, steps, and inputs.
# - Document all inputs, outputs, and secrets at the top.
# - Use 'workflow_call' for reusability and composability.
# - Use 'id:' for steps whose outputs are needed later.
# - Pin action versions for reproducibility.
