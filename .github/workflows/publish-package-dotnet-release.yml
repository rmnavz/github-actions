
# ============================================================================
# Publish Package (.NET Release)
# Publishes NuGet packages using any versioning scheme and creates a GitHub release. Designed for universal use and workflow reusability.
# ----------------------------------------------------------------------------
# Inputs:
#   release_version (string, required): Release version (e.g., 1.2.3, 2025.08.08, release-42)
#   prerelease (boolean, optional): Is this a prerelease? (default: false)
#   include_test_results (boolean, optional): Include test results in release notes (default: true)
#   artifact_name (string, optional): Name of the NuGet artifact to download (default: nuget-packages)
# Secrets:
#   NUGET_API_KEY: API key for publishing to NuGet.org
#   GITHUB_TOKEN: GitHub token for creating releases
# Outputs:
#   release_url: URL of the created GitHub release
# Usage Example:
#   jobs:
#     publish-release:
#       uses: rmnavz/github-actions/.github/workflows/publish-package-dotnet-release.yml@v1.0.0
#       with:
#         release_version: '1.2.3'
#         prerelease: false
#         include_test_results: true
#         artifact_name: 'nuget-packages'
# Documentation: See docs/publish-package-dotnet-release.md
# ============================================================================

name: Publish Package (.NET Release)

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: false
        type: boolean
      include_test_results:
        description: 'Include test results in release notes'
        required: false
        default: true
        type: boolean
      artifact_name:
        description: 'Name of the NuGet artifact to download'
        required: false
        default: 'nuget-packages'
        type: string
    outputs:
      release_url:
        description: 'URL of the created GitHub release'
        value: ${{ jobs.publish-release.outputs.release_url }}
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.2.3, 2025.08.08, release-42)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: false
        type: boolean
      include_test_results:
        description: 'Include test results in release notes'
        required: false
        default: true
        type: boolean
      artifact_name:
        description: 'Name of the NuGet artifact to download'
        required: false
        default: 'nuget-packages'
        type: string


jobs:
  publish-release:
    name: Publish NuGet Package and Create Release
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.create_release.outputs.html_url }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Download NuGet Packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
      - name: Download Test Results (Optional)
        uses: actions/download-artifact@v4
        with:
          name: test-results
        continue-on-error: true
        if: ${{ inputs.include_test_results }}
      - name: Publish to NuGet
        run: |
          for pkg in ./*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "# Release ${{ inputs.release_version }}" > release_notes.md
          echo "" >> release_notes.md
          if [ "${{ inputs.include_test_results }}" == "true" ] && [ -d "TestResults" ] && [ $(find TestResults -name "*.trx" | wc -l) -gt 0 ]; then
            echo "## 🧪 Test Results" >> release_notes.md
            echo "" >> release_notes.md
            total_tests=$(find TestResults -name "*.trx" -exec grep -o 'total="[0-9]*"' {} \; | grep -o '[0-9]*' | head -1)
            passed_tests=$(find TestResults -name "*.trx" -exec grep -o 'passed="[0-9]*"' {} \; | grep -o '[0-9]*' | head -1)
            failed_tests=$(find TestResults -name "*.trx" -exec grep -o 'failed="[0-9]*"' {} \; | grep -o '[0-9]*' | head -1)
            if [ -n "$total_tests" ] && [ -n "$passed_tests" ]; then
              echo "- ✅ **$passed_tests** tests passed" >> release_notes.md
              if [ -n "$failed_tests" ] && [ "$failed_tests" != "0" ]; then
                echo "- ❌ **$failed_tests** tests failed" >> release_notes.md
              fi
              echo "- 📊 **$total_tests** total tests executed" >> release_notes.md
            else
              echo "- ✅ All tests passed successfully" >> release_notes.md
            fi
            echo "" >> release_notes.md
          fi
          echo "## 📦 NuGet Packages" >> release_notes.md
          echo "" >> release_notes.md
          if [ $(find . -name "*.nupkg" -type f | wc -l) -gt 0 ]; then
            echo "This release includes the following NuGet packages:" >> release_notes.md
            for pkg in *.nupkg; do
              if [ -f "$pkg" ]; then
                echo "- \`$pkg\`" >> release_notes.md
              fi
            done
          fi
          echo "" >> release_notes.md
          echo "## 📝 Changelog" >> release_notes.md
          if [ -f "CHANGELOG.md" ]; then
            cat CHANGELOG.md >> release_notes.md
          else
            echo "No changelog available." >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "## 🔄 Recent Commits" >> release_notes.md
          git log --pretty=format:'- %s (%an, %h)' --no-merges -n 10 >> release_notes.md
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.release_version }}
          name: Release ${{ inputs.release_version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          body_path: release_notes.md
          files: "*.nupkg"
