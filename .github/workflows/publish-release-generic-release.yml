# ============================================================================
# Publish Release (Generic Release)
# Creates a GitHub release with any versioning scheme, attaches specified artifacts, and generates release notes.
# ----------------------------------------------------------------------------
# Inputs:
#   release_version (string, required): Release version (e.g., v1.0, 2025.08.10, release-42)
#   artifact_names (string, required): Comma-separated list of artifact names to attach
#   include_test_results (boolean, optional): Include test results in release notes (default: false)
#   changelog_path (string, optional): Path to changelog file (default: CHANGELOG.md)
#   commit_count (number, optional): Number of recent commits to include (default: 10)
# Secrets:
#   GITHUB_TOKEN: GitHub token for creating releases
# Outputs:
#   release_url: URL of the created GitHub release
# Usage Example:
#   jobs:
#     publish-release:
#       uses: rmnavz/github-actions/.github/workflows/publish-release-generic-release.yml@v1.0.0
#       with:
#         release_version: 'v1.0.0'
#         artifact_names: 'nuget-packages,docs-artifact'
#         include_test_results: false
#         changelog_path: 'CHANGELOG.md'
#         commit_count: 10
# Documentation: See docs/publish-release-generic-release.md
# ============================================================================

name: Publish Release (Generic Release)

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0, 2025.08.10, release-42)'
        required: true
        type: string
      artifact_names:
        description: 'Comma-separated list of artifact names to attach to the release'
        required: true
        type: string
      include_test_results:
        description: 'Include test results in release notes'
        required: false
        default: false
        type: boolean
      changelog_path:
        description: 'Path to changelog file'
        required: false
        default: 'CHANGELOG.md'
        type: string
      commit_count:
        description: 'Number of recent commits to include'
        required: false
        default: 10
        type: number
      artifact_patterns:
        description: 'Comma-separated glob patterns for release assets (e.g., *.nupkg,docs/*.zip)'
        required: false
        default: '*.nupkg'
        type: string
    outputs:
      release_url:
        description: 'URL of the created GitHub release'
        value: ${{ jobs.publish-release.outputs.release_url }}
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0, 2025.08.10, release-42)'
        required: true
        type: string
      artifact_names:
        description: 'Comma-separated list of artifact names to attach to the release'
        required: true
        type: string
      include_test_results:
        description: 'Include test results in release notes'
        required: false
        default: false
        type: boolean
      changelog_path:
        description: 'Path to changelog file'
        required: false
        default: 'CHANGELOG.md'
        type: string
      commit_count:
        description: 'Number of recent commits to include'
        required: false
        default: 10
        type: number
      artifact_patterns:
        description: 'Comma-separated glob patterns for release assets (e.g., *.nupkg,docs/*.zip)'
        required: false
        default: '*.nupkg'
        type: string

jobs:
  publish-release:
    name: Create Generic Release
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect Prerelease
        id: detect_prerelease
        run: |
          version="${{ inputs.release_version }}"
          # Match -alpha, -beta, -rc, -pre, -preview (case-insensitive)
          if [[ "${version,,}" =~ -(alpha|beta|rc|pre|preview) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Download Artifacts
        run: |
          mkdir -p artifacts
          IFS=',' read -ra NAMES <<< "${{ inputs.artifact_names }}"
          for name in "${NAMES[@]}"; do
            gh run download --name "$name" --dir artifacts || { echo "::error::Artifact '$name' not found. Please check if the artifact was uploaded in a previous job and that the name is correct."; exit 1; }
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Find Release Assets
        id: find_assets
        run: |
          patterns="${{ inputs.artifact_patterns }}"
          files=""
          IFS=',' read -ra globs <<< "$patterns"
          for pattern in "${globs[@]}"; do
            # Recursively search in artifacts directory
            for f in $(find artifacts -type f -name "$pattern" 2>/dev/null); do
              [ -e "$f" ] && files="$files $f"
            done
          done
          files=$(echo $files | xargs) # trim
          echo "files=$files" >> $GITHUB_OUTPUT
      - name: Validate Release Assets
        if: always()
        run: |
          if [ -z "${{ steps.find_assets.outputs.files }}" ]; then
            echo "::error::No files found for release assets. Check your artifact_patterns input and ensure artifacts are downloaded."
            exit 1
          fi
      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "# Release ${{ inputs.release_version }}" > release_notes.md
          echo "_Published on $(date -u '+%Y-%m-%d %H:%M UTC')_" >> release_notes.md
          echo "" >> release_notes.md

          if [ "${{ inputs.include_test_results }}" == "true" ]; then
            if [ -d artifacts ]; then
              trx_files=$(find artifacts -type f -name "*.trx" 2>/dev/null)
            else
              trx_files=""
            fi
            if [ -n "$trx_files" ]; then
              echo "## 🧪 Test Results" >> release_notes.md
              echo "" >> release_notes.md
              total_tests=$(printf '%s\n' $trx_files | xargs -r grep -ho 'total="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {if(NR>0) print s; else print ""}')
              passed_tests=$(grep -ho 'passed=\"[0-9]*\"' $trx_files | grep -o '[0-9]*' | awk '{s+=$1} END {if(NR>0) print s; else print \"\"}')
              failed_tests=$(grep -ho 'failed=\"[0-9]*\"' $trx_files | grep -o '[0-9]*' | awk '{s+=$1} END {if(NR>0) print s; else print \"\"}')
              if [ -n "$total_tests" ] && [ -n "$passed_tests" ]; then
                echo "- ✅ **$passed_tests** tests passed" >> release_notes.md
                if [ -n "$failed_tests" ] && [ "$failed_tests" != "0" ]; then
                  echo "- ❌ **$failed_tests** tests failed" >> release_notes.md
                fi
                echo "- 📊 **$total_tests** total tests executed" >> release_notes.md
              else
                echo "- ⚠️ No test results could be parsed from .trx files." >> release_notes.md
              fi
            else
              echo "- ⚠️ No .trx test result files found." >> release_notes.md
            fi
          fi

          echo "" >> release_notes.md
          echo "## 📦 Artifacts" >> release_notes.md
          echo "" >> release_notes.md
          for name in $(echo ${{ inputs.artifact_names }} | tr ',' '\\n'); do
            echo "- $name" >> release_notes.md
          done
          echo "" >> release_notes.md
          echo "## 📦 Released Files" >> release_notes.md
          if [ -n "${{ steps.find_assets.outputs.files }}" ]; then
            for file in ${{ steps.find_assets.outputs.files }}; do
              echo "- $(basename \"$file\")" >> release_notes.md
            done
          else
            echo "No files matched artifact_patterns." >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "## 📝 Changelog" >> release_notes.md
          changelog_file="${{ inputs.changelog_path }}"
          # Recursively search for changelog in artifacts directory
          found_changelog=$(find artifacts -type f -name "$(basename "$changelog_file")" 2>/dev/null | head -n 1)
          if [ -n "$found_changelog" ]; then
            cat "$found_changelog" >> release_notes.md
          elif [ -f "$changelog_file" ]; then
            cat "$changelog_file" >> release_notes.md
          else
            echo "No changelog available." >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "## 🔄 Recent Commits" >> release_notes.md
          git log --pretty=format:'- %s (%an, %h)' --no-merges -n ${{ inputs.commit_count }} >> release_notes.md
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.release_version }}
          name: Release ${{ inputs.release_version }}
          draft: false
          # Improved prerelease detection: only true if version contains -alpha, -beta, -rc, -pre, or -preview (case-insensitive)
          prerelease: ${{ steps.detect_prerelease.outputs.is_prerelease }}
          body_path: release_notes.md
          files: ${{ steps.find_assets.outputs.files }}
