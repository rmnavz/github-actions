# ============================================================================
# Publish Docs (Generic Pages)
# Publishes static documentation (e.g., DocFX) to GitHub Pages.
# Designed for universal use and workflow reusability.
# ----------------------------------------------------------------------------
# Inputs:
#   docfx_project_path (string, required): Path to DocFX project directory
#   dotnet_version (string, optional): .NET SDK version (default: 8.x)
#   docfx_version (string, optional): DocFX tool version (default: 2.78.3)
# Outputs:
#   page_url: URL of the deployed GitHub Pages site
# Usage Example:
#   jobs:
#     publish-docs:
#       uses: your-org/github-actions/.github/workflows/publish-docs-generic-pages.yml@v1.0.0
#       with:
#         docfx_project_path: 'docs'
#         dotnet_version: '8.x'
#         docfx_version: '2.78.3'
# Documentation: See docs/publish-docs-generic-pages.md for more details.
# ============================================================================

name: "Publish Docs (Generic Pages)"

on:
  workflow_call:
    inputs:
      # Required inputs first
      docfx_project_path:
        description: 'Path to the DocFX project directory (relative to repo root)'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version'
        required: false
        default: '8.x'
        type: string
      docfx_version:
        description: 'DocFX tool version'
        required: false
        default: '2.78.3'
        type: string
    outputs:
      page_url:
        description: 'URL of the deployed GitHub Pages site'
        value: ${{ jobs.publish-docs.outputs.page_url }}

permissions:
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    name: Publish Documentation to GitHub Pages
    runs-on: ubuntu-latest
    outputs:
      # Use the custom set_page_url step because actions/deploy-pages does not output the final Pages URL.
      page_url: ${{ steps.set_page_url.outputs.page_url }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}


      - name: Validate docfx_project_path
        run: |
          # Fail if path is absolute
          if [[ "${{ inputs.docfx_project_path }}" = /* ]]; then
            echo "Error: docfx_project_path must be a relative path."
            exit 1
          fi
          # Fail if path contains '..' or suspicious characters
          if [[ "${{ inputs.docfx_project_path }}" == *".."* ]] || [[ "${{ inputs.docfx_project_path }}" =~ [';|$`&() \	'] ]]; then
            echo "Error: docfx_project_path contains invalid characters."
            exit 1
          fi
          # Fail if directory does not exist or docfx.json is missing
          if [ ! -f "${{ inputs.docfx_project_path }}/docfx.json" ]; then
            echo "Error: docfx.json not found in docfx_project_path."
            exit 1
          fi

      # Install DocFX at the specified version for reproducibility and security
      - name: Install DocFX
        run: dotnet tool update -g docfx --version ${{ inputs.docfx_version }}

      - name: Build Documentation
        run: docfx ${{ inputs.docfx_project_path }}/docfx.json

      - name: Ensure index.html exists
        run: |
          SITE_PATH="${{ inputs.docfx_project_path }}/_site"
          # Some static site generators (like DocFX) output README.html instead of index.html for the root.
          # GitHub Pages requires index.html at the site root. Copy if needed.
          if [ -f "$SITE_PATH/README.html" ] && [ ! -f "$SITE_PATH/index.html" ]; then
            cp "$SITE_PATH/README.html" "$SITE_PATH/index.html"
            if [ $? -ne 0 ]; then
              echo "Error: Failed to copy README.html to index.html. Aborting deployment." >&2
              exit 1
            fi
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ inputs.docfx_project_path }}/_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Set page_url output
        id: set_page_url
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          SITE_PATH="${{ inputs.docfx_project_path }}/_site"
          # If a CNAME file exists, use its value as the custom domain for the page_url.
          if [ -f "$SITE_PATH/CNAME" ]; then
            # Read the first line, trim whitespace, and use as the custom domain.
            CUSTOM_DOMAIN=$(head -n 1 "$SITE_PATH/CNAME" | tr -d '\r\n[:space:]')
            PAGE_URL="https://$CUSTOM_DOMAIN/"
          else
            # GitHub Pages convention: user/organization sites are named 'owner.github.io'
            # and are hosted at 'https://owner.github.io/'. Project sites are hosted at
            # 'https://owner.github.io/repo'. See:
            # https://docs.github.com/en/pages/getting-started-with-github-pages/about-github-pages#types-of-github-pages-sites
            if [ "$REPO_NAME" = "$REPO_OWNER.github.io" ]; then
              PAGE_URL="https://$REPO_OWNER.github.io/"
            else
              PAGE_URL="https://$REPO_OWNER.github.io/$REPO_NAME/"
            fi
          fi
          echo "page_url=$PAGE_URL" >> $GITHUB_OUTPUT
